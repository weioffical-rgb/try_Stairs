<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果凍小人 - 巔峰挑戰</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; touch-action: none; user-select: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); }
        
        #player { width: 50px; height: 50px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); position: absolute; transform-origin: bottom center; border-radius: 14px; z-index: 100; box-shadow: 0 5px 10px rgba(255,154,158,0.3); will-change: transform, left, bottom; }
        #eyes { position: absolute; top: 12px; width: 10px; height: 10px; background: white; border-radius: 50%; transition: left 0.1s ease; }
        
        #tutorial-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 25px 40px; border-radius: 30px; text-align: center; color: #4a5568; z-index: 400; 
            transition: opacity 0.5s, visibility 0.5s; width: 80%; max-width: 350px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .jump-wave { position: absolute; width: 40px; height: 15px; border: 3px solid rgba(255,255,255,0.9); border-radius: 50%; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); animation: wave-ani 0.4s ease-out forwards; }
        .super-wave { border: 5px solid #fff176; box-shadow: 0 0 20px #fff59d; }
        @keyframes wave-ani { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; } }
        
        #ui-header { position: absolute; top: 25px; width: 100%; text-align: center; z-index: 200; pointer-events: none; }
        .score-box { display: inline-block; background: rgba(255,255,255,0.85); color: #5d6d7e; padding: 10px 30px; border-radius: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .new-record-glow { color: #f39c12; animation: glow 1s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 2px #fff; } to { text-shadow: 0 0 10px #f39c12; } }
        
        .platform { position: absolute; height: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.4); z-index: 5; background: rgba(255,255,255,0.7); transform-origin: center center; }
        .danger { background: rgba(255, 82, 82, 0.7); }
        .expand { background: rgba(155, 89, 182, 0.7); }
        .seesaw { background: rgba(241, 196, 15, 0.7); border-color: #f39c12; }
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translateX(2px); } 100% { transform: translateX(-2px); } }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: white; text-align: center; }
        #rank-label { font-size: 22px; color: #fff176; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px; }
        #restart-btn { background: #ff9a9e; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        #reset-record-btn { margin-top: 35px; font-size: 12px; color: rgba(255,255,255,0.4); cursor: pointer; text-decoration: underline; }
        
        .mobile-ui { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 300; pointer-events: none; display: none; }
        .btn { position: absolute; background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: center; pointer-events: auto; border-radius: 22px; font-weight: bold; }
        #btn-left { bottom: 25px; left: 15px; width: 75px; height: 75px; font-size: 24px; }
        #btn-right { bottom: 25px; left: 100px; width: 75px; height: 75px; font-size: 24px; }
        #btn-action { bottom: 20px; right: 15px; width: 115px; height: 85px; border-radius: 35px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-header">
            <div class="score-box">
                <div id="score-ui">巔峰高度: 0 m</div>
                <div id="best-ui" style="font-size:13px; opacity:0.8; margin-top:4px;">最高紀錄: 0 m</div>
            </div>
        </div>

        <div id="tutorial-overlay">
            <h3 style="margin:0">⚖️ 巔峰攀爬挑戰</h3>
            <p id="tut-device-msg" style="margin: 15px 0; font-weight: 500;">載入中...</p>
            <div style="color:#d69e2e; font-weight:bold; font-size: 14px;">✨ 技巧：鬆開蓄力後秒按跳躍可發動「超級跳」！</div>
            <p style="font-size:12px; margin-top:15px; opacity:0.6;">( 操作即開始 )</p>
        </div>

        <div id="overlay">
            <div id="rank-label">RANK: -</div>
            <h1 id="over-title">失足墜落！</h1>
            <p id="final-score" style="font-size: 18px; margin: 10px 0;"></p>
            <button id="restart-btn">重新挑戰 (R)</button>
            <div id="reset-record-btn">清除最高紀錄</div>
        </div>
        <div id="player"><div id="eyes"></div></div>
        <div id="plat-box"></div>
        <div class="mobile-ui" id="mobile-ctrl">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
            <div class="btn" id="btn-action">ACTION</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player'), eyes = document.getElementById('eyes'), platBox = document.getElementById('plat-box'), scoreUI = document.getElementById('score-ui'), bestUI = document.getElementById('best-ui'), overlay = document.getElementById('overlay'), container = document.getElementById('game-container'), tutOverlay = document.getElementById('tutorial-overlay');
        
        let px, py, vx, vy, score, cameraY, nextPlatY, highScore, platforms = [], isDead = false, loopId = null, frameCount = 0, facingRight = true, standingOn = null, maxReachedY = 0, hasMoved = false, isCrouching = false;
        const GRAVITY = 0.72, FALL_G = 2.3, JUMP_P = 15.5, FRICTION = 0.86, MOVE_ACC = 1.6;
        let lastTime = 0;

        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const tutMsg = document.getElementById('tut-device-msg');
        if (isTouch) {
            document.getElementById('mobile-ctrl').style.display = 'block';
            tutMsg.innerText = "按鈕移動，長按 ACTION 蓄力，點擊跳躍";
        } else {
            tutMsg.innerText = "A/D 移動，Space 跳躍，S 鍵蓄力";
        }

        function loadBest() {
            const saved = localStorage.getItem('jelly_high_score');
            highScore = (saved && !isNaN(saved)) ? parseInt(saved, 10) : 0;
            bestUI.innerText = `最高紀錄: ${highScore} m`;
        }
        loadBest();

        function hideTut() {
            if(!hasMoved) { hasMoved = true; tutOverlay.style.opacity = '0'; tutOverlay.style.visibility = 'hidden'; }
        }

        function initGame() {
            if (loopId) cancelAnimationFrame(loopId);
            isDead = false; frameCount = 0; px = window.innerWidth / 2; py = 120; vx = 0; vy = 0; score = 0; cameraY = 0; nextPlatY = 220; platforms = []; facingRight = true; standingOn = null; maxReachedY = 120;
            lastTime = performance.now();
            platBox.innerHTML = ''; overlay.style.display = 'none'; scoreUI.innerText = `巔峰高度: 0 m`;
            bestUI.classList.remove('new-record-glow');
            loadBest();
            spawnPlatform(window.innerWidth/2 - 100, 100, 200, 'normal');
            for(let i=0; i<20; i++) generateNextPlatform();
            loopId = requestAnimationFrame(update);
        }

        function spawnPlatform(x, y, baseW, type) {
            const d = document.createElement('div');
            d.className = 'platform ' + type;
            let actualW = (type === 'seesaw') ? baseW * 2 : baseW;
            d.style.width = actualW + 'px'; d.style.left = x + 'px';
            platBox.appendChild(d);
            platforms.push({ x, y, baseW: actualW, currentW: actualW, type, el: d, speed: 0.065, dead: false, shakeTimer: 0, angle: 0, phase: Math.random()*6 });
        }

        function generateNextPlatform() {
            let randomW = (Math.random() * 3 + 1.5) * 50;
            const x = Math.random() * (window.innerWidth - (randomW * 1.5));
            let roll = Math.random(), type = 'normal';
            if (score > 100) {
                if (roll > 0.82) type = 'expand'; else if (roll > 0.68) type = 'seesaw'; else if (roll > 0.48) type = 'danger';
            }
            spawnPlatform(x, nextPlatY, randomW, type);
            nextPlatY += 90 + Math.random() * 35;
        }

        function triggerFX(isSuper) {
            const wave = document.createElement('div');
            wave.className = 'jump-wave' + (isSuper ? ' super-wave' : '');
            wave.style.left = px + 'px'; wave.style.bottom = Math.floor(py - cameraY) + 'px';
            container.appendChild(wave);
            setTimeout(() => wave.remove(), 400);
        }

        let m_keys = { left: false, right: false };

        function update(timestamp) {
            if (isDead) return;
            loopId = requestAnimationFrame(update);
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / (1000 / 60); 
            lastTime = timestamp;
            if (dt > 2) dt = 2;

            if (m_keys.left) { vx -= MOVE_ACC * dt; facingRight = false; hideTut(); }
            if (m_keys.right) { vx += MOVE_ACC * dt; facingRight = true; hideTut(); }
            vx *= Math.pow(FRICTION, dt); px += vx * dt;
            if (px < 0) px = window.innerWidth; if (px > window.innerWidth) px = 0;
            
            if (standingOn && standingOn.type === 'seesaw') {
                let dist = px - (standingOn.x + standingOn.baseW / 2);
                py = standingOn.y + 15 - Math.tan(standingOn.angle * Math.PI / 180) * dist;
                vy = 0;
            } else {
                vy -= (isCrouching ? FALL_G : GRAVITY) * dt;
                py += vy * dt;
            }

            maxReachedY = Math.max(maxReachedY, py);
            let screenPos = py - cameraY;
            if (screenPos > window.innerHeight * 0.65) cameraY += (screenPos - window.innerHeight * 0.65) * 0.08 * dt;
            else if (screenPos < window.innerHeight * 0.35) cameraY += (screenPos - window.innerHeight * 0.35) * 0.05 * dt;

            score = Math.max(score, Math.floor(maxReachedY / 10) - 12);
            scoreUI.innerText = `巔峰高度: ${score} m`;

            if (nextPlatY - cameraY < window.innerHeight + 1200) generateNextPlatform(); // 超前生成

            platforms = platforms.filter(p => {
                if (p.y < cameraY - 2000) { p.el.remove(); return false; } // 延後回收
                let trans = `translateZ(0) `;
                if (p.type === 'expand' && !p.dead) {
                    let factor = (Math.sin(performance.now() * 0.004 + p.phase) + 1) / 2;
                    p.currentW = 60 + factor * (p.baseW * 2.5 - 60);
                    trans += `scaleX(${p.currentW / p.baseW}) `;
                } else if (p.type === 'seesaw') {
                    p.angle *= Math.pow(0.95, dt); trans += `rotate(${p.angle}deg) `;
                }
                p.el.style.transform = trans;
                p.el.style.bottom = Math.floor(p.y - cameraY) + 'px';
                return true;
            });

            standingOn = null;
            platforms.forEach(p => {
                let pL = p.x + (p.baseW - p.currentW) / 2, pR = pL + p.currentW;
                if (!p.dead && px + 22 > pL && px - 22 < pR) {
                    let platTop = p.y + 15;
                    if (p.type === 'seesaw') platTop -= Math.tan(p.angle * Math.PI / 180) * (px - (p.x + p.baseW / 2));
                    if (vy <= 0 && py >= platTop - 15 && py <= platTop + 15) {
                        standingOn = p; py = platTop; vy = 0; jumpCount = 0;
                        if (p.type === 'danger') {
                            p.shakeTimer += dt; p.el.classList.add('shaking');
                            if (p.shakeTimer > 70) { p.dead = true; p.el.style.opacity = '0'; standingOn = null; }
                        }
                        if (p.type === 'seesaw') {
                            let dist = px - (p.x + p.baseW / 2);
                            p.angle += ((dist / (p.baseW / 2) * 30) - p.angle) * 0.1 * dt;
                            vx += p.angle * 0.012 * dt;
                        }
                    }
                }
            });

            if (py < cameraY - 800) gameOver();
            draw();
        }

        function draw() {
            player.style.left = px + 'px'; 
            player.style.bottom = Math.floor(py - cameraY) + 'px';
            let sx = isCrouching ? 1.35 : (vy !== 0 ? 0.85 : 1), sy = 1/sx;
            let rot = (standingOn && standingOn.type === 'seesaw') ? standingOn.angle : 0;
            player.style.transform = `translateX(-50%) scale(${sx}, ${sy}) rotate(${-rot}deg) translateZ(0)`;
            eyes.style.left = facingRight ? '32px' : '8px';
        }

        function gameOver() {
            isDead = true; overlay.style.display = 'flex';
            document.getElementById('final-score').innerText = `高度: ${score} m`;
            let rank = "果凍新手";
            if (score > 2500) rank = "🌌 宇宙傳說"; else if (score > 1200) rank = "🧗 高空探險家"; else if (score > 500) rank = "🏃 平地跳躍者";
            document.getElementById('rank-label').innerText = `RANK: ${rank}`;
            if (score > highScore) localStorage.setItem('jelly_high_score', score);
        }

        let jumpCount = 0, lastRelease = 0;
        function handleJump() {
            if (jumpCount >= 2 || isDead) return;
            hideTut();
            let pwr = JUMP_P, isS = false, now = Date.now();
            if (jumpCount === 0 && now - lastRelease < 250 && !isCrouching) { pwr *= 1.4; isS = true; }
            triggerFX(isS);
            vy = pwr; standingOn = null; jumpCount++; isCrouching = false;
        }

        document.getElementById('reset-record-btn').onclick = () => {
            if(confirm("確定要清除最高紀錄？")) {
                localStorage.removeItem('jelly_high_score');
                highScore = 0; bestUI.innerText = `最高紀錄: 0 m`;
            }
        };

        if (isTouch) {
            const btn = (id, k) => { document.getElementById(id).ontouchstart=(e)=>{e.preventDefault(); m_keys[k]=true;}; document.getElementById(id).ontouchend=(e)=>{e.preventDefault(); m_keys[k]=false;}; };
            btn('btn-left', 'left'); btn('btn-right', 'right');
            let t; document.getElementById('btn-action').ontouchstart=(e)=>{e.preventDefault(); t=setTimeout(()=>isCrouching=true, 150);};
            document.getElementById('btn-action').ontouchend=(e)=>{e.preventDefault(); clearTimeout(t); if(!isCrouching) handleJump(); else {isCrouching=false; lastRelease=Date.now();}};
        }
        window.onkeydown = (e) => { let k = e.key.toLowerCase(); if(k==='r') initGame(); if(isDead) return; if(k==='a') m_keys.left=true; if(k==='d') m_keys.right=true; if(k==='s') isCrouching=true; if(k===' '||k==='w') handleJump(); };
        window.onkeyup = (e) => { let k = e.key.toLowerCase(); if(k==='a') m_keys.left=false; if(k==='d') m_keys.right=false; if(k==='s') {isCrouching=false; lastRelease=Date.now();} };
        document.getElementById('restart-btn').onclick = initGame;
        initGame();
    </script>
</body>
</html>
