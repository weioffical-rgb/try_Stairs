<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果凍小人 - 巔峰攀爬</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; touch-action: none; user-select: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); }
        
        #player { 
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            position: absolute; transform-origin: bottom center; 
            border-radius: 14px; z-index: 100; 
            box-shadow: 0 5px 10px rgba(255,154,158,0.3); 
            will-change: transform, left, bottom; 
        }

        #eyes { position: absolute; top: 12px; width: 10px; height: 10px; background: white; border-radius: 50%; transition: left 0.1s ease; }
        
        #ui-header { position: absolute; top: 25px; width: 100%; text-align: center; z-index: 500; pointer-events: none; }
        .score-box { display: inline-block; background: rgba(255,255,255,0.85); color: #5d6d7e; padding: 10px 30px; border-radius: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .new-record-glow { color: #f39c12; animation: glow 1s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 2px #fff; } to { text-shadow: 0 0 10px #f39c12; } }

        #tutorial-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 25px 40px; border-radius: 30px; 
            text-align: center; color: #4a5568; z-index: 600; 
            transition: opacity 0.5s, visibility 0.5s; width: 80%; max-width: 390px; 
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .platform { position: absolute; height: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.4); z-index: 5; background: rgba(255,255,255,0.7); transform-origin: center center; }
        .danger { background: rgba(255, 82, 82, 0.7); }
        .expand { background: rgba(155, 89, 182, 0.7); }
        .seesaw { background: rgba(241, 196, 15, 0.7); border-color: #f39c12; }
        .ice { background: linear-gradient(135deg, #001a66 0%, #0044ff 100%); border: 2px solid #ffffff; box-shadow: 0 0 25px rgba(0, 51, 204, 0.9); }
        
        .spiky { background: #1b5e20; border: none; }
        .spiky::before, .spiky::after { content: '▲▲▲▲'; position: absolute; top: -14px; color: #ff1744; font-size: 12px; font-weight: bold; letter-spacing: 2px; }
        .spiky::before { left: 10px; } .spiky::after { right: 10px; }

        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translateX(2px); } 100% { transform: translateX(-2px); } }
        
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; color: white; text-align: center; 
        }
        #rank-label { font-size: 24px; color: #fff176; margin-bottom: 5px; font-weight: bold; letter-spacing: 2px; }
        #restart-btn { background: #ff9a9e; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        #reset-record-btn { margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.4); cursor: pointer; text-decoration: underline; pointer-events: auto; }

        .mobile-ui { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 400; pointer-events: none; display: none; }
        .btn { position: absolute; background: rgba(255, 255, 255, 0.5); border: 2px solid rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: center; pointer-events: auto; border-radius: 22px; font-weight: bold; font-size: 24px; color: #444; }
        #btn-left { bottom: 30px; left: 20px; width: 80px; height: 80px; }
        #btn-right { bottom: 30px; left: 110px; width: 80px; height: 80px; }
        #btn-action { bottom: 30px; right: 20px; width: 120px; height: 90px; border-radius: 40px; }

        .jump-wave { position: absolute; width: 40px; height: 15px; border: 3px solid rgba(255,255,255,0.9); border-radius: 50%; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); animation: wave-ani 0.4s forwards; }
        .super-wave { border: 5px solid #fff176; box-shadow: 0 0 20px #fff59d; }
        @keyframes wave-ani { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; } }

        #lava {
            position: absolute;
            left: 0;
            width: 100%;
            height: 420px;
            bottom: -520px;
            z-index: 40;
            pointer-events: none;
            background:
                linear-gradient(180deg,
                    rgba(255,245,120,0.97) 0%,
                    rgba(255,190,0,0.97) 14%,
                    rgba(255,120,25,0.98) 35%,
                    rgba(245,70,20,0.99) 58%,
                    rgba(170,20,20,1) 100%);
            box-shadow:
                0 0 40px rgba(255,87,34,0.9),
                0 0 140px rgba(255,120,0,0.55);
            border-top: 6px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }

        #lava::before {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 34px;
            background:
                radial-gradient(circle at 5% 100%, rgba(255,255,255,0.72) 0 10px, transparent 11px),
                radial-gradient(circle at 18% 100%, rgba(255,230,120,0.95) 0 16px, transparent 17px),
                radial-gradient(circle at 33% 100%, rgba(255,255,255,0.56) 0 11px, transparent 12px),
                radial-gradient(circle at 49% 100%, rgba(255,220,90,0.88) 0 15px, transparent 16px),
                radial-gradient(circle at 64% 100%, rgba(255,255,255,0.6) 0 12px, transparent 13px),
                radial-gradient(circle at 79% 100%, rgba(255,215,70,0.88) 0 17px, transparent 18px),
                radial-gradient(circle at 92% 100%, rgba(255,255,255,0.65) 0 11px, transparent 12px);
            opacity: 0.9;
        }

        #lava-ui { font-size: 13px; opacity: 0.95; margin-top: 4px; transition: color 0.2s ease, text-shadow 0.2s ease, transform 0.2s ease; }
        .lava-safe { color: #2e7d32; text-shadow: none; transform: scale(1); }
        .lava-mid { color: #fdd835; text-shadow: none; transform: scale(1); }
        .lava-warn { color: #fb8c00; text-shadow: 0 0 8px rgba(255,140,0,0.35); transform: scale(1.02); }
        .lava-danger { color: #ff1744; text-shadow: 0 0 12px rgba(255,23,68,0.65); transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-header">
            <div class="score-box">
                <div id="score-ui">巔峰高度: 0 m</div>
                <div id="best-ui" style="font-size:13px; opacity:0.8; margin-top:4px;">最高紀錄: 0 m</div>
                <div id="lava-ui" class="lava-safe">岩漿待命：操作後開始倒數</div>
            </div>
        </div>

        <div id="tutorial-overlay">
            <h3 style="margin:0 0 10px 0;">🎮 操作說明</h3>
            <p id="tut-device-msg" style="margin:0 0 10px 0;">載入中...</p>
            <div style="font-size:14px; margin-bottom:10px; color:#ef6c00; font-weight:bold;">
                本次更新：玩家操作後才開始 10 秒倒數，之後岩漿開始追擊並越追越快
            </div>
            <div style="color:#ff1744; font-weight:bold;">⚠️ 警告：掉落區間減半，離開鏡頭即死！</div>
        </div>

        <div id="overlay">
            <div id="rank-label">RANK: -</div>
            <h1 id="over-title">失足墜落！</h1>
            <p id="final-score" style="font-size: 18px; margin: 10px 0;"></p>
            <p id="record-msg" style="color: #fff176; font-weight: bold;"></p>
            <button id="restart-btn">重新挑戰 (R)</button>
            <div id="reset-record-btn">清除最高紀錄</div>
        </div>
        
        <div id="player"><div id="eyes"></div></div>
        <div id="plat-box"></div>
        <div id="lava"></div>
        
        <div class="mobile-ui" id="mobile-ctrl">
            <div class="btn" id="btn-left">←</div><div class="btn" id="btn-right">→</div><div class="btn" id="btn-action">ACTION</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player'), eyes = document.getElementById('eyes'), platBox = document.getElementById('plat-box'), scoreUI = document.getElementById('score-ui'), bestUI = document.getElementById('best-ui'), lavaUI = document.getElementById('lava-ui'), lavaEl = document.getElementById('lava'), overlay = document.getElementById('overlay'), container = document.getElementById('game-container'), tutOverlay = document.getElementById('tutorial-overlay');
        
        let px, py, vx, vy, score, cameraY, nextPlatY, highScore, platforms = [], isDead = false, loopId = null, frameCount = 0, facingRight = true, standingOn = null, maxReachedY = 0, hasMoved = false, isCrouching = false, lastTime = 0, firstInputTime = null, lavaStarted = false, lavaY = -9999, gameActivated = false, m_keys = { left: false, right: false };
        
        const GRAVITY = 0.72, FALL_G = 2.3, JUMP_P = 15.5, FRICTION_NORMAL = 0.86, FRICTION_ICE = 0.9992, MOVE_ACC = 1.6, LAVA_HEIGHT = 420;

        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        document.getElementById('tut-device-msg').innerText = isTouch ? "左右鈕移動，長按 ACTION 蓄力" : "A/D 移動，Space 跳躍，S 蓄力";
        if (isTouch) document.getElementById('mobile-ctrl').style.display = 'block';

        function loadBest() { 
            highScore = parseInt(localStorage.getItem('jelly_high_score')) || 0; 
            bestUI.innerText = `最高紀錄: ${highScore} m`; 
        }

        function hideTut() {
            if(!hasMoved) {
                hasMoved = true;
                tutOverlay.style.opacity = '0';
                setTimeout(()=>tutOverlay.style.visibility='hidden', 500);
            }
        }

        function activateGame() {
            if (!gameActivated) {
                gameActivated = true;
                firstInputTime = performance.now();
                setLavaUIState('lava-safe', '岩漿倒數: 10 秒');
            }
        }

        function setLavaUIState(state, text) {
            lavaUI.classList.remove('lava-safe', 'lava-mid', 'lava-warn', 'lava-danger');
            lavaUI.classList.add(state);
            lavaUI.innerText = text;
        }

        function updateLavaDistanceUI(distance) {
            if (distance > 120) setLavaUIState('lava-safe', `岩漿距離: ${distance} m`);
            else if (distance > 70) setLavaUIState('lava-mid', `岩漿距離: ${distance} m`);
            else if (distance > 30) setLavaUIState('lava-warn', `岩漿距離: ${distance} m`);
            else setLavaUIState('lava-danger', `岩漿距離: ${distance} m`);
        }

        function initGame() {
            if (loopId) cancelAnimationFrame(loopId);
            isDead = false; frameCount = 0; px = window.innerWidth / 2; py = 120; vx = 0; vy = 0; score = 0; cameraY = 0; nextPlatY = 220; platforms = []; facingRight = true; standingOn = null; maxReachedY = 120;
            lastTime = performance.now(); firstInputTime = null; lavaStarted = false; lavaY = -9999; hasMoved = false; gameActivated = false;
            platBox.innerHTML = ''; overlay.style.display = 'none'; lavaEl.style.bottom = '-520px';
            setLavaUIState('lava-safe', '岩漿待命：操作後開始倒數');
            bestUI.classList.remove('new-record-glow');
            tutOverlay.style.opacity = '1';
            tutOverlay.style.visibility = 'visible';
            loadBest();
            spawnPlatform(window.innerWidth/2 - 100, 100, 200, 'normal');
            const initialPlatformCount = isTouch ? 25 : 52;
            for(let i=0; i<initialPlatformCount; i++) generateNextPlatform();
            loopId = requestAnimationFrame(update);
        }

        function spawnPlatform(x, y, baseW, type) {
            const d = document.createElement('div'); d.className = 'platform ' + type;
            let actualW = (type === 'seesaw' ? baseW * 2 : baseW);
            if (type === 'ice' && actualW < 200) actualW = 200;
            if (type === 'spiky' && actualW < 220) actualW = 220;
            d.style.width = actualW + 'px'; d.style.left = x + 'px'; platBox.appendChild(d);
            let tilt = (type === 'ice') ? (Math.random() * 60 - 30) : 0;
            platforms.push({ x, y, baseW: actualW, currentW: actualW, type, el: d, dead: false, shakeTimer: 0, angle: tilt, phase: Math.random()*6 });
        }

        function generateNextPlatform() {
            let mult = Math.max(1.1, 5.0 - (score / 65));
            let randomW = (Math.random() * (mult - 1) + 1) * 50;
            const x = Math.random() * (window.innerWidth - (randomW * 1.5));
            let roll = Math.random(), type = 'normal';
            if (score > 15) {
                if (roll > 0.75) type = 'spiky';
                else if (roll > 0.55) type = 'ice';    
                else if (roll > 0.35) type = 'expand'; 
                else if (roll > 0.18) type = 'seesaw'; 
                else if (roll > 0.06) type = 'danger';
            }
            spawnPlatform(x, nextPlatY, randomW, type);
            let baseGap = isTouch ? 180 : 76;
            let randomGap = isTouch ? 70 : 34;
            nextPlatY += baseGap + Math.random() * randomGap;
        }

        function triggerFX(isSuper) {
            const wave = document.createElement('div'); 
            wave.className = 'jump-wave' + (isSuper ? ' super-wave' : '');
            wave.style.left = px + 'px'; wave.style.bottom = Math.floor(py - cameraY) + 'px';
            container.appendChild(wave); 
            setTimeout(() => wave.remove(), 400);
        }

        function update(timestamp) {
            if (isDead) return; loopId = requestAnimationFrame(update);
            if (!lastTime) lastTime = timestamp;
            let dt = Math.min((timestamp - lastTime) / (1000 / 60), 2); lastTime = timestamp;

            let onIce = standingOn && standingOn.type === 'ice';
            let acc = MOVE_ACC * (isCrouching ? 0.6 : 1) * dt;
            if (m_keys.left) { vx -= acc * (onIce && vx > 0 ? 0.25 : 1); facingRight = false; hideTut(); }
            if (m_keys.right) { vx += acc * (onIce && vx < 0 ? 0.25 : 1); facingRight = true; hideTut(); }
            
            if (standingOn) { vx += Math.sin(standingOn.angle * Math.PI / 180) * 0.48 * dt; }
            vx *= Math.pow((onIce ? FRICTION_ICE : FRICTION_NORMAL), dt); 
            px += vx * dt;
            if (px < 0) px = window.innerWidth; if (px > window.innerWidth) px = 0;
            
            if (standingOn) {
                let platTop = standingOn.y + 15;
                if (standingOn.type === 'seesaw' || standingOn.type === 'ice') {
                    platTop -= Math.tan(standingOn.angle * Math.PI / 180) * (px - (standingOn.x + standingOn.baseW / 2));
                }
                py = platTop; vy = 0;
            } else { vy -= (isCrouching ? FALL_G : GRAVITY) * dt; py += vy * dt; }

            maxReachedY = Math.max(maxReachedY, py);
            let screenPos = py - cameraY;
            if (screenPos > window.innerHeight * 0.60) cameraY += (screenPos - window.innerHeight * 0.60) * 0.08 * dt;
            else if (screenPos < window.innerHeight * 0.35) cameraY += (screenPos - window.innerHeight * 0.35) * 0.05 * dt;

            score = Math.max(score, Math.floor(maxReachedY / 10) - 12);
            scoreUI.innerText = `巔峰高度: ${score} m`;
            if (score > highScore && highScore > 0) { bestUI.innerText = `刷新巔峰: ${score} m`; bestUI.classList.add('new-record-glow'); }

            if (gameActivated) {
                const activeSec = (timestamp - firstInputTime) / 1000;
                if (!lavaStarted && activeSec >= 10) {
                    lavaStarted = true;
                    lavaY = cameraY - 520;
                }

                if (lavaStarted) {
                    const lavaSpeed = (1.0 + (activeSec - 10) * 0.05) * dt;
                    lavaY += lavaSpeed;
                    lavaEl.style.bottom = Math.floor(lavaY - cameraY) + 'px';

                    const lavaTopY = lavaY + LAVA_HEIGHT;
                    const lavaDistance = Math.max(0, Math.floor((py - lavaTopY) / 10));
                    updateLavaDistanceUI(lavaDistance);

                    if (py <= lavaTopY) {
                        gameOver('被岩漿吞沒！');
                        return;
                    }
                } else {
                    const remain = Math.max(0, Math.ceil(10 - activeSec));
                    setLavaUIState('lava-safe', `岩漿倒數: ${remain} 秒`);
                }
            } else {
                lavaEl.style.bottom = '-520px';
                setLavaUIState('lava-safe', '岩漿待命：操作後開始倒數');
            }

            if (nextPlatY - cameraY < window.innerHeight + 1500) generateNextPlatform();
            platforms = platforms.filter(p => {
                if (p.y < cameraY - 2300) { p.el.remove(); return false; } 
                let trans = `translateZ(0) `;
                if (p.type === 'expand' && !p.dead) {
                    let f = (Math.sin(performance.now()*0.004+p.phase)+1)/2;
                    p.currentW = 60 + f * (p.baseW*2.5 - 60);
                    trans += `scaleX(${p.currentW / p.baseW}) `;
                } else { trans += `rotate(${p.angle}deg) `; }
                p.el.style.transform = trans; p.el.style.bottom = Math.floor(p.y - cameraY) + 'px';
                return true;
            });

            standingOn = null;
            platforms.forEach(p => {
                let pL = p.x + (p.baseW - p.currentW) / 2, pR = pL + p.currentW;
                if (!p.dead && px + 22 > pL && px - 22 < pR) {
                    let platTop = p.y + 15;
                    if (p.type === 'seesaw' || p.type === 'ice') platTop -= Math.tan(p.angle * Math.PI / 180) * (px - (p.x + p.baseW / 2));
                    if (vy <= 0 && py >= platTop - 20 && py <= platTop + 20) {
                        standingOn = p; py = platTop; vy = 0; jumpCount = 0;
                        if (p.type === 'spiky') {
                            let rel = (px - pL) / p.currentW;
                            if (rel < 0.35 || rel > 0.65) { vx = (rel < 0.5 ? -48 : 48); vy = 18; standingOn = null; }
                        }
                        if (p.type === 'danger') {
                            p.shakeTimer += dt; p.el.classList.add('shaking');
                            if (p.shakeTimer > 70) { p.dead = true; p.el.style.opacity = '0'; standingOn = null; }
                        } else if (p.type === 'seesaw') {
                            let dist = px - (p.x + p.baseW / 2);
                            p.angle += ((dist / (p.baseW / 2) * 55) - p.angle) * 0.15 * dt;
                        }
                    }
                }
            });
            
            if (py < cameraY - 400) gameOver(); 
            draw();
        }

        function draw() {
            player.style.left = px + 'px'; player.style.bottom = Math.floor(py - cameraY) + 'px';
            let sx = isCrouching ? 1.45 : (vy !== 0 ? 0.85 : 1);
            player.style.transform = `translateX(-50%) scale(${sx}, ${1/sx}) rotate(${- (standingOn?.angle || 0)}deg) translateZ(0)`;
            eyes.style.left = facingRight ? '32px' : '8px';
        }

        function gameOver(reason = '失足墜落！') { 
            isDead = true; overlay.style.display = 'flex'; document.getElementById('over-title').innerText = reason; document.getElementById('final-score').innerText = `本次最終高度: ${score} m`;
            let r = "💩 Beginner";
            if (score > 50000) r = "👁️ THE GOD"; else if (score > 20000) r = "🛸 GALAXY"; else if (score > 10000) r = "🌌 SPACE"; else if (score > 5000) r = "🏔️ KING"; else if (score > 2000) r = "🧗 ELITE"; else if (score > 500) r = "🏃 JUMPER";
            document.getElementById('rank-label').innerText = `RANK: ${r}`;
            const rMsg = document.getElementById('record-msg');
            if (score > highScore) { rMsg.innerText = "🎊 刷新歷史紀錄！ 🎊"; localStorage.setItem('jelly_high_score', score); highScore = score; }
            else { rMsg.innerText = `距離紀錄還差 ${highScore - score} m`; }
        }

        let jumpCount = 0, lastRel = 0;
        function handleJump() {
            if (jumpCount >= 2 || isDead) return;
            activateGame();
            hideTut();
            let pwr = JUMP_P, isS = false, now = Date.now();
            if (jumpCount === 0 && now - lastRel < 250 && !isCrouching) { pwr *= 1.45; isS = true; }
            triggerFX(isS); vy = pwr; standingOn = null; jumpCount++; isCrouching = false;
        }

        if (isTouch) {
            const b = (id, k) => { 
                document.getElementById(id).addEventListener('touchstart', (e)=>{ e.preventDefault(); activateGame(); if(k){ m_keys[k]=true; hideTut(); } }); 
                document.getElementById(id).addEventListener('touchend', (e)=>{ e.preventDefault(); if(k) m_keys[k]=false; }); 
            };
            b('btn-left', 'left'); b('btn-right', 'right');
            let t; 
            document.getElementById('btn-action').addEventListener('touchstart', (e)=>{ e.preventDefault(); activateGame(); hideTut(); t=setTimeout(()=>isCrouching=true, 180); });
            document.getElementById('btn-action').addEventListener('touchend', (e)=>{ e.preventDefault(); clearTimeout(t); if(!isCrouching) handleJump(); else {isCrouching=false; lastRel=Date.now();} });
        }

        document.getElementById('reset-record-btn').onclick = () => { if(confirm("清除紀錄？")) { localStorage.removeItem('jelly_high_score'); highScore = 0; initGame(); } };
        document.getElementById('restart-btn').onclick = initGame;
        window.onkeydown = (e) => { 
            let k = e.key.toLowerCase();
            if(k==='r') initGame();
            if(isDead) return;
            if(k==='a') { activateGame(); hideTut(); m_keys.left=true; }
            if(k==='d') { activateGame(); hideTut(); m_keys.right=true; }
            if(k==='s') { activateGame(); hideTut(); isCrouching=true; }
            if(k===' '||k==='w') { e.preventDefault(); handleJump(); }
        };
        window.onkeyup = (e) => { let k = e.key.toLowerCase(); if(k==='a') m_keys.left=false; if(k==='d') m_keys.right=false; if(k==='s') {isCrouching=false; lastRel=Date.now();} };
        initGame();
    </script>
</body>
</html>
