<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>果凍小人</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fce4ec; font-family: sans-serif; touch-action: none; user-select: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); }
        
        #player {
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: absolute; bottom: 0; left: 0;
            transform-origin: bottom center; border-radius: 14px; z-index: 100;
            box-shadow: 0 5px 10px rgba(255, 154, 158, 0.3);
            /* 強制開啟硬體加速 */
            will-change: transform, left, bottom;
            transform: translateZ(0);
        }
        #eyes { position: absolute; top: 12px; width: 10px; height: 10px; background: white; border-radius: 50%; transition: left 0.1s ease; }

        #ui-header { position: absolute; top: 25px; width: 100%; text-align: center; z-index: 200; pointer-events: none; }
        .score-box { display: inline-block; background: rgba(255,255,255,0.85); color: #5d6d7e; padding: 8px 25px; border-radius: 20px; font-weight: bold; font-size: 18px; }
        .best-score { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .milestone {
            position: absolute; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.6);
            color: #5d6d7e; font-weight: bold; font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; pointer-events: none;
        }

        #tutorial-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 40px; border-radius: 30px; text-align: center; color: #4a5568; z-index: 400; transition: opacity 0.4s; width: 80%; max-width: 350px; border: 1px solid rgba(0,0,0,0.05);
        }

        .platform { 
            position: absolute; height: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.4); z-index: 5; 
            background: rgba(255, 255, 255, 0.7); 
            /* 效能核心：固定寬度配合 transform-origin */
            transform-origin: center center;
            will-change: transform;
            transform: translateZ(0); 
        }
        .danger { background: rgba(255, 82, 82, 0.7); border-color: #ff5252; }
        .expand { background: rgba(155, 89, 182, 0.7); border-color: #8e44ad; }
        
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translateX(2px) translateZ(0); } 100% { transform: translateX(-2px) translateZ(0); } }

        .jump-wave { position: absolute; left: 50%; bottom: -15px; width: 40px; height: 15px; border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; animation: wave 0.4s forwards; z-index: -1; }
        .super-wave { border-color: #fff176; box-shadow: 0 0 15px #fff59d; border-width: 6px; }
        @keyframes wave { 0% { transform: translateX(-50%) scale(0.1); opacity: 1; } 100% { transform: translateX(-50%) scale(3.5); opacity: 0; } }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; color: white;
        }
        #restart-btn { background: #ff9a9e; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        .mobile-ui { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 300; pointer-events: none; display: none; }
        .btn { position: absolute; background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: center; pointer-events: auto; border-radius: 22px; }
        #btn-left { bottom: 25px; left: 15px; width: 75px; height: 75px; font-size: 24px; }
        #btn-right { bottom: 25px; left: 100px; width: 75px; height: 75px; font-size: 24px; }
        #btn-action { bottom: 20px; right: 15px; width: 115px; height: 85px; border-radius: 35px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-header">
            <div class="score-box">
                <div id="score-ui">高度: 0 m</div>
                <div id="best-ui" class="best-score">最高: 0 m</div>
            </div>
        </div>
        <div id="tutorial-overlay">
            <h3 style="margin:0">🎮 效能優化挑戰</h3>
            <p id="tut-msg">A/D 移動，Space 跳躍，S 蹲下</p>
            <div style="color:#d69e2e; font-weight:bold;">✨ 蓄力跳：鬆開蹲下後秒按跳躍！</div>
        </div>
        <div id="overlay">
            <h1 id="over-title">摔下去了！</h1>
            <p id="final-score"></p>
            <button id="restart-btn">再試一次 (R)</button>
        </div>
        <div id="best-milestone" class="milestone" style="display:none;">--- 🏆 BEST RECORD ---</div>
        <div id="player"><div id="eyes"></div></div>
        <div id="plat-box"></div>
        <div class="mobile-ui" id="mobile-ctrl">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
            <div class="btn" id="btn-action">ACTION</div>
        </div>
    </div>

    <script>
        const player = document.getElementById('player'), eyes = document.getElementById('eyes'), platBox = document.getElementById('plat-box'), scoreUI = document.getElementById('score-ui'), bestUI = document.getElementById('best-ui'), tutOverlay = document.getElementById('tutorial-overlay'), overlay = document.getElementById('overlay'), milestoneLine = document.getElementById('best-milestone');
        
        let px, py, vx, vy, score, cameraY, nextPlatY, highScore, platforms = [], isDead = false, loopId = null, frameCount = 0, hasMoved = false, facingRight = true;
        
        const GRAVITY = 0.72, FALL_G = 2.3, JUMP_P = 15.5, FRICTION = 0.88;
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouch) { 
            document.getElementById('mobile-ctrl').style.display = 'block';
            document.getElementById('tut-msg').innerText = "左右箭頭移動，長按 ACTION 蓄力";
        }

        function loadBest() {
            const saved = localStorage.getItem('jelly_high_score');
            highScore = saved ? parseInt(saved, 10) : 0;
            bestUI.innerText = `最高: ${highScore} m`;
            if (highScore > 0) {
                milestoneLine.style.display = 'flex';
                milestoneLine.innerText = `--- 🏆 BEST RECORD ${highScore}m ---`;
            }
        }
        loadBest();

        function initGame() {
            if (loopId) cancelAnimationFrame(loopId);
            isDead = false; frameCount = 0; px = window.innerWidth / 2; py = 120; vx = 0; vy = 0; score = 0; cameraY = 0; nextPlatY = 220; platforms = []; facingRight = true;
            platBox.innerHTML = ''; overlay.style.display = 'none'; scoreUI.innerText = `高度: 0 m`;
            spawnPlatform(window.innerWidth/2 - 100, 100, 200, 'normal');
            for(let i=0; i<10; i++) generateNextPlatform();
            loopId = requestAnimationFrame(update);
        }

        function spawnPlatform(x, y, baseW, type) {
            const d = document.createElement('div');
            d.className = 'platform ' + type;
            // 效能關鍵：固定寬度，使用 transform 縮放
            d.style.width = baseW + 'px';
            d.style.left = x + 'px';
            platBox.appendChild(d);
            const speed = 0.065 + (Math.random() - 0.5) * 0.01;
            platforms.push({ x, y, baseW, currentW: baseW, type, el: d, phase: Math.random()*6, speed, dead: false, shakeTimer: 0 });
        }

        function generateNextPlatform() {
            let mult = Math.max(1.8, 6 - (score / 40));
            let randomW = (Math.random() * (mult - 1) + 1) * 50;
            const x = Math.random() * (window.innerWidth - randomW);
            let roll = Math.random(), type = 'normal';
            if (score > 200) {
                if (roll > 0.8) type = 'expand'; else if (roll > 0.6) type = 'danger';
            } else { if (roll > 0.85) type = 'danger'; }
            spawnPlatform(x, nextPlatY, randomW, type);
            nextPlatY += 90 + Math.random() * 35;
        }

        function hideTut() { if(!hasMoved) { hasMoved = true; tutOverlay.style.opacity = '0'; setTimeout(() => tutOverlay.style.display = 'none', 400); } }

        function update() {
            if (isDead) return;
            frameCount++;
            let acc = (isTouch ? 0.75 : 1.1) * (isCrouching ? 0.6 : 1);
            if (m.left) { vx -= acc; facingRight = false; hideTut(); }
            if (m.right) { vx += acc; facingRight = true; hideTut(); }
            vx *= FRICTION; px += vx;
            if (px < 0) px = window.innerWidth; if (px > window.innerWidth) px = 0;
            vy -= (isCrouching ? FALL_G : GRAVITY); py += vy;

            if (py - cameraY > window.innerHeight * 0.42) {
                cameraY += (py - cameraY - window.innerHeight * 0.42) * 0.15;
                score = Math.max(score, Math.floor(py / 10) - 12);
                scoreUI.innerText = `高度: ${score} m`;
            }

            if (highScore > 0) {
                let milestoneY = (highScore + 12) * 10;
                milestoneLine.style.bottom = (milestoneY - cameraY) + 'px';
            }

            platforms.forEach(p => {
                if (p.type === 'expand' && !p.dead) {
                    let minW = 120;
                    let maxW = p.baseW * 2.5;
                    let factor = (Math.sin(frameCount * p.speed + p.phase) + 1) / 2;
                    p.currentW = minW + factor * (maxW - minW);
                    
                    // 效能核心：完全不改寬度與位移，只改 Scale
                    // visualScale = 目前寬度 / 初始寬度
                    let visualScale = p.currentW / p.baseW;
                    p.el.style.transform = `translateZ(0) scaleX(${visualScale})`;
                } else {
                    p.el.style.transform = `translateZ(0) scaleX(1)`;
                }
                p.el.style.bottom = (p.y - cameraY) + 'px';
            });

            if (vy <= 0) {
                platforms.forEach(p => {
                    // 對稱縮放的邊界計算
                    let pL = p.x + (p.baseW - p.currentW) / 2;
                    let pR = pL + p.currentW;
                    if (!p.dead && px + 22 > pL && px - 22 < pR && (py - vy) >= p.y + 15 && py <= p.y + 15) {
                        py = p.y + 15; vy = 0; jumpCount = 0;
                        if (p.type === 'danger') {
                            p.shakeTimer++; p.el.classList.add('shaking');
                            if (p.shakeTimer > 25) { p.dead = true; p.el.style.opacity = '0'; }
                        }
                    }
                });
            }

            if (nextPlatY - cameraY < window.innerHeight + 300) generateNextPlatform();
            platforms = platforms.filter(p => { if (p.y < cameraY - 80) { p.el.remove(); return false; } return true; });
            if (py < cameraY - 10) gameOver();

            draw();
            loopId = requestAnimationFrame(update);
        }

        function draw() {
            player.style.left = px + 'px'; player.style.bottom = (py - cameraY) + 'px';
            let sx = isCrouching ? 1.35 : (vy !== 0 ? 0.85 : 1), sy = 1/sx;
            player.style.transform = `translateX(-50%) scale(${sx}, ${sy}) translateZ(0)`;
            eyes.style.left = facingRight ? '32px' : '8px';
        }

        function gameOver() {
            isDead = true; overlay.style.display = 'flex';
            document.getElementById('final-score').innerText = `最終高度: ${score} m`;
            if (score > highScore) {
                highScore = score; localStorage.setItem('jelly_high_score', score);
                document.getElementById('over-title').innerText = "🎉 新紀錄！";
                bestUI.innerText = `最高: ${highScore} m`;
                milestoneLine.innerText = `--- 🏆 BEST RECORD ${highScore}m ---`;
            } else { document.getElementById('over-title').innerText = "摔下去了！"; }
        }

        let m = { left: false, right: false }, isCrouching = false, jumpCount = 0, lastRelease = 0;
        function handleJump() {
            if (jumpCount >= 2 || isDead) return;
            hideTut();
            let pwr = JUMP_P, isS = false, now = Date.now();
            if (jumpCount === 0 && now - lastRelease < 250 && !isCrouching) { pwr *= 1.4; isS = true; }
            const wave = document.createElement('div');
            wave.className = 'jump-wave' + (isS ? ' super-wave' : '');
            player.appendChild(wave); setTimeout(() => wave.remove(), 400);
            vy = pwr; jumpCount++; isCrouching = false;
        }

        if (isTouch) {
            const act = document.getElementById('btn-action'); let timer;
            act.addEventListener('touchstart', (e) => { e.preventDefault(); hideTut(); timer = setTimeout(()=>isCrouching=true, 150); });
            act.addEventListener('touchend', (e) => { e.preventDefault(); clearTimeout(timer); if(!isCrouching) handleJump(); else { isCrouching=false; lastRelease=Date.now(); } });
            const b = (id, k) => { document.getElementById(id).addEventListener('touchstart', (e)=>{e.preventDefault(); hideTut(); m[k]=true;}); document.getElementById(id).addEventListener('touchend', (e)=>{e.preventDefault(); m[k]=false;}); };
            b('btn-left', 'left'); b('btn-right', 'right');
        }
        window.onkeydown = (e) => {
            let k = e.key.toLowerCase(); if(k==='r') { initGame(); return; } if(isDead) return;
            hideTut(); if(k==='a') m.left = true; if(k==='d') m.right = true; if(k==='s') isCrouching = true;
            if(k===' '||k==='w') { e.preventDefault(); handleJump(); }
        };
        window.onkeyup = (e) => {
            let k = e.key.toLowerCase(); if(k==='a') m.left = false; if(k==='d') m.right = false;
            if(k==='s') { isCrouching = false; lastRelease = Date.now(); }
        };
        document.getElementById('restart-btn').onclick = initGame;
        initGame();
    </script>
</body>
</html>
